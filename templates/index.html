{% extends "base.html" %}

{% block content %}
<h1>Users</h1>

<ul class="user-list">
    {% for user in users %}
    <li class="user-entry">
        <h3>{{ user.name }}</h3>

        <div class="user-actions">
            <a href="{{ url_for('get_movies', user_id=user.id) }}" class="btn">View Movies</a>

            <form action="{{ url_for('delete_user', user_id=user.id) }}" method="post" class="delete-user-form">
                <button type="submit" class="delete-btn">Delete User</button>
            </form>
        </div>
    </li>
    {% endfor %}
</ul>

<div class="section-card">
    <h2>Add New User</h2>
    <form action="{{ url_for('create_user') }}" method="post" class="inline-form">
        <input type="text" name="name" placeholder="User name" required>
        <button type="submit">Add User</button>
    </form>
</div>
{% endblock %}
